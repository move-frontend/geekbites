name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Check cache
        uses: actions/cache@v6
        id: node-cache # use this to check for `cache-hit` (`steps.node-cache.outputs.cache-hit != 'true'`)
        with:
          path: '**/node_modules'
          key: ubuntu-latest-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install node modules
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        env:
          CI: true

      - name: Build artifact
        run: npm run build

      - name: Check for broken links
        run: npm run check-broken-links:internal

      - name: Archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: dist

  DeployProduction:
    name: Deploy to Production
    needs: [Build]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: 'https://geekbites.move4mobile.io'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: dist

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live

  CreateRelease:
    name: Create Release
    # Only on push — a manual redeploy (workflow_dispatch) should never cut a release.
    if: github.event_name == 'push'
    needs: [Build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: '0'
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: dist

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"

      - name: Check cache
        uses: actions/cache@v6
        id: node-cache # use this to check for `cache-hit` (`steps.node-cache.outputs.cache-hit != 'true'`)
        with:
          path: '**/node_modules'
          key: ubuntu-latest-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install node modules
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        env:
          CI: true

      - name: Zip site artifact
        run: |
          mkdir -p artifacts
          zip -r ./artifacts/site ./dist/*

      - name: Semantic release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
