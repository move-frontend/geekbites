# Managed by galaxy-brain — regenerate with `audit-dependabot` or edit deliberately.
# Source: discipline-frontend/galaxy-brain.yml § standards.dependabot
# Project extensions (documented in project-geekbites/galaxy-brain.yml → standards-override):
#   - `eleventy` group (project stack; not part of the discipline recipes)
# Dependabot PRs are reviewed and merged by a human — `main` requires an
# approving review, so there is no auto-merge. (The former `automerge` label +
# .github/workflows/automerge.yml were a no-op under branch protection and were
# removed.)
version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Amsterdam'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    cooldown:
      default-days: 3
      semver-patch-days: 2
      semver-minor-days: 4
      semver-major-days: 5
      exclude:
        - '@angular/*'
        - '@angular-devkit/*'
        - '@angular-builders/*'
        - '@schematics/angular'
        - '@nx/*'
        - 'nx'
    groups:
      eleventy:
        applies-to: version-updates
        patterns:
          - '@11ty/*'
      release-tools:
        applies-to: version-updates
        patterns:
          - '@semantic-release/*'
          - 'semantic-release'
          - '@commitlint/*'
          - 'commitlint'
          - 'commitizen'
          - 'husky'
          - 'lint-staged'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Amsterdam'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'automerge'
    # github-actions has no semver semantics for Dependabot cooldowns —
    # only default-days is supported for this ecosystem.
    cooldown:
      default-days: 3
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
